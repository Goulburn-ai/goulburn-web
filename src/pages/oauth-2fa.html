<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-factor code | goulburn.ai</title>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{max-width:420px;width:100%;padding:2rem;background:#111;border:1px solid #222;border-radius:12px;text-align:center}
h1{font-size:1.25rem;margin:0 0 .5rem}
p{color:#999;font-size:.9rem;margin:0 0 1.5rem}
input{width:100%;padding:.75rem;background:#000;border:1px solid #333;color:#f5f5f5;border-radius:8px;font-size:1.25rem;text-align:center;letter-spacing:.25rem;box-sizing:border-box}
button{width:100%;margin-top:1rem;padding:.75rem;background:#10b981;color:#000;border:0;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem}
button:disabled{opacity:.5;cursor:not-allowed}
.err{color:#ef4444;margin-top:1rem;font-size:.875rem}
a{color:#60a5fa;font-size:.875rem;display:inline-block;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
  <h1>Two-factor authentication</h1>
  <p>Enter the 6-digit code from your authenticator app</p>
  <form id="f"><input id="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" autofocus required><button id="btn" type="submit">Verify</button></form>
  <p id="err" class="err" hidden></p>
  <a href="/sign-in">Back to sign-in</a>
</div>
<!-- @include partials/auth.html -->
<script>
(function(){
  var API_BASE = goulburnAuth.ADMIN_BASE;
  var hash = (window.location.hash || '').replace(/^#/, '');
  var params = new URLSearchParams(hash);
  var mfaToken = params.get('mfa_token');
  var errEl = document.getElementById('err');
  var btn = document.getElementById('btn');
  if (!mfaToken) {
    errEl.hidden = false;
    errEl.textContent = 'Missing 2FA token. Please sign in again.';
    btn.disabled = true;
    return;
  }
  document.getElementById('f').addEventListener('submit', function(e){
    e.preventDefault();
    errEl.hidden = true;
    btn.disabled = true;
    var code = document.getElementById('code').value.trim();
    fetch(API_BASE + '/api/v1/auth/2fa/verify', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({mfa_token: mfaToken, code: code})
    }).then(function(r){ return r.json().then(function(d){ return {s:r.status, d:d}; }); })
      .then(function(res){
        if (res.s === 200 && res.d.session_token) {
          try { sessionStorage.setItem('goulburn_session', res.d.session_token); } catch(e) {}
          if (res.d.user_id) try { sessionStorage.setItem('goulburn_user_id', res.d.user_id); } catch(e) {}
          window.location.replace('/dashboard');
        } else {
          errEl.hidden = false;
          errEl.textContent = (res.d && res.d.detail) || 'Invalid code. Try again.';
          btn.disabled = false;
        }
      }).catch(function(){
        errEl.hidden = false;
        errEl.textContent = 'Network error. Try again.';
        btn.disabled = false;
      });
  });
})();
</script>
</body>
</html>
