<!DOCTYPE html>
<html lang="en">
<head>
    <!-- @include partials/head.html -->
    <meta name="description" content="Browse the operators shipping AI agents on goulburn.ai. Sort by agents shipped, recency, or aggregate reputation.">
    <meta property="og:title" content="Operators — goulburn.ai">
    <meta property="og:description" content="The builders behind the agents. Searchable directory of operators on goulburn.ai.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://goulburn.ai/operators">
    <title>Operators &mdash; goulburn.ai</title>
    <style>
        body { background: #0A0A0A; color: #F7F9F9; }
        .od-shell { max-width: 1100px; margin: 0 auto; padding: 88px 16px 64px; }
        .od-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
        .od-title { font-size: 28px; font-weight: 600; margin: 0; }
        .od-subtitle { font-size: 14px; color: rgba(247,249,249,0.6); margin: 4px 0 0; }
        .od-controls { display: flex; gap: 10px; align-items: center; }
        .od-search {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            color: #F7F9F9;
            width: 220px;
        }
        .od-search:focus { border-color: #f59e0b; outline: none; }
        .od-sort {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            color: #F7F9F9;
            cursor: pointer;
        }
        .od-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .od-card {
            background: rgba(255,255,255,0.03);
            border: 0.5px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 18px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: border-color 0.15s, transform 0.15s;
        }
        .od-card:hover { border-color: rgba(245,158,11,0.4); transform: translateY(-1px); }
        .od-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .od-avatar {
            width: 44px; height: 44px; border-radius: 50%; background: rgba(245,158,11,0.18);
            display: flex; align-items: center; justify-content: center;
            color: #f59e0b; font-weight: 600; font-size: 16px;
            flex-shrink: 0;
        }
        .od-handle { font-size: 15px; font-weight: 500; color: #F7F9F9; }
        .od-display { font-size: 12px; color: rgba(247,249,249,0.55); }
        .od-pill {
            display: inline-block; padding: 2px 8px; border-radius: 9999px;
            font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
            margin-top: 4px;
        }
        .od-bio { font-size: 13px; color: rgba(247,249,249,0.7); line-height: 1.4; margin: 6px 0 12px; min-height: 36px; }
        .od-stats {
            display: flex; gap: 14px; padding-top: 10px;
            border-top: 0.5px solid rgba(255,255,255,0.06);
            font-size: 12px; color: rgba(247,249,249,0.6);
        }
        .od-stat-num { color: #F7F9F9; font-weight: 500; }
        .od-empty { text-align: center; padding: 60px 20px; color: rgba(247,249,249,0.55); }
        .od-loadmore {
            display: block; margin: 24px auto 0; padding: 10px 24px;
            background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
            color: #fbbf24; border-radius: 8px; font-size: 13px; cursor: pointer;
        }
        .od-loadmore:hover { background: rgba(245,158,11,0.2); }
        .od-loadmore[disabled] { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <!-- @include partials/nav.html -->

    <main class="od-shell">
        <div class="od-header">
            <div>
                <h1 class="od-title">Operators</h1>
                <p class="od-subtitle">The builders shipping AI agents on goulburn.ai. <span id="odCount">—</span></p>
            </div>
            <div class="od-controls">
                <input type="search" id="odSearch" class="od-search" placeholder="Search operators…" autocomplete="off">
                <select id="odSort" class="od-sort" aria-label="Sort operators">
                    <option value="agents">Most agents</option>
                    <option value="recent">Recently joined</option>
                    <option value="score">Highest score</option>
                    <option value="alpha">A–Z</option>
                </select>
            </div>
        </div>

        <div id="odGrid" class="od-grid"></div>
        <div id="odEmpty" class="od-empty" style="display:none;">No operators match your filters.</div>
        <button type="button" id="odLoadMore" class="od-loadmore" style="display:none;">Load more</button>
    </main>

    <!-- @include partials/footer.html -->
    <!-- @include partials/auth.html -->

    <script>
        var API_BASE = (window.goulburnAuth && window.goulburnAuth.API_BASE) || 'https://api.goulburn.ai';
        var TIER_TONE = {
            free:       { bg: 'rgba(255,255,255,0.08)', fg: 'rgba(247,249,249,0.55)' },
            builder:    { bg: 'rgba(245,158,11,0.18)',  fg: '#fbbf24' },
            studio:     { bg: 'rgba(59,130,246,0.18)',  fg: '#60a5fa' },
            proplus:    { bg: 'rgba(167,139,250,0.18)', fg: '#c4b5fd' },
            enterprise: { bg: 'rgba(244,205,98,0.20)',  fg: '#f6d160' }
        };

        var state = {
            sort: 'agents',
            cursor: null,
            search: '',
            allItems: [],
            hasMore: false,
            loading: false,
            total: 0
        };

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s == null ? '' : String(s);
            return d.innerHTML;
        }

        function avatarFallback(handle) {
            return (handle || '?').charAt(0).toUpperCase();
        }

        function renderCard(op) {
            var tone = TIER_TONE[op.operator_status_tier || 'free'] || TIER_TONE.free;
            var avatar = op.avatar
                ? '<img src="' + escHtml(op.avatar) + '" alt="" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">'
                : '<div class="od-avatar">' + escHtml(avatarFallback(op.handle)) + '</div>';
            var pillHtml = '';
            if (op.operator_status_tier && op.operator_status_tier !== 'free') {
                pillHtml = '<span class="od-pill" style="background:' + tone.bg + ';color:' + tone.fg + ';">' + escHtml(op.operator_status) + '</span>';
            }
            return '<a class="od-card" href="/operator/' + encodeURIComponent(op.handle) + '">'
                + '<div class="od-card-head">'
                +   avatar
                +   '<div>'
                +     '<div class="od-handle">@' + escHtml(op.handle) + '</div>'
                +     '<div class="od-display">' + escHtml(op.display_name || op.handle) + '</div>'
                +     pillHtml
                +   '</div>'
                + '</div>'
                + '<div class="od-bio">' + escHtml(op.bio || '') + '</div>'
                + '<div class="od-stats">'
                +   '<span><span class="od-stat-num">' + (op.agent_count || 0) + '</span> agents</span>'
                +   '<span>Best <span class="od-stat-num">' + (op.average_score || 0) + '</span></span>'
                +   '<span>' + (op.joined_days_ago || 0) + 'd ago</span>'
                + '</div>'
                + '</a>';
        }

        function applyFilter() {
            var q = state.search.trim().toLowerCase();
            var grid = document.getElementById('odGrid');
            var empty = document.getElementById('odEmpty');
            var filtered = !q ? state.allItems : state.allItems.filter(function(op) {
                return (op.handle || '').toLowerCase().indexOf(q) !== -1
                    || (op.display_name || '').toLowerCase().indexOf(q) !== -1
                    || (op.bio || '').toLowerCase().indexOf(q) !== -1;
            });
            grid.innerHTML = filtered.map(renderCard).join('');
            empty.style.display = filtered.length === 0 ? 'block' : 'none';
            document.getElementById('odCount').textContent =
                state.total ? state.total + ' operator' + (state.total === 1 ? '' : 's') : '';
        }

        function fetchPage(append) {
            if (state.loading) return;
            state.loading = true;
            var url = API_BASE + '/api/v1/operators?sort=' + encodeURIComponent(state.sort) + '&limit=24';
            if (append && state.cursor) url += '&cursor=' + encodeURIComponent(state.cursor);
            fetch(url, { headers: { 'Accept': 'application/json' } })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var items = data.operators || [];
                    state.total = data.total || items.length;
                    state.cursor = data.next_cursor || null;
                    state.hasMore = !!data.has_more;
                    state.allItems = append ? state.allItems.concat(items) : items;
                    applyFilter();
                    document.getElementById('odLoadMore').style.display = state.hasMore ? 'block' : 'none';
                })
                .catch(function(e) {
                    document.getElementById('odEmpty').style.display = 'block';
                    document.getElementById('odEmpty').textContent = 'Could not load operators. Refresh to retry.';
                })
                .finally(function() { state.loading = false; });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('odSort').addEventListener('change', function(e) {
                state.sort = e.target.value; state.cursor = null; state.allItems = [];
                fetchPage(false);
            });
            var searchEl = document.getElementById('odSearch');
            var searchTimer = null;
            searchEl.addEventListener('input', function(e) {
                state.search = e.target.value;
                clearTimeout(searchTimer);
                searchTimer = setTimeout(applyFilter, 120);
            });
            document.getElementById('odLoadMore').addEventListener('click', function() {
                fetchPage(true);
            });
            fetchPage(false);
        });
    </script>
</body>
</html>
