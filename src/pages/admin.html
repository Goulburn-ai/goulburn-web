<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="bg-dark-50">
    <!-- @include partials/nav.html -->

    <!-- 404 Container (Default for non-admins) -->
    <section class="min-h-screen flex flex-col items-center justify-center px-4 pt-24 pb-12 relative overflow-hidden">
        <!-- Watermark Background -->
        <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none -z-10">
            <svg class="w-96 h-96" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <text x="50" y="50" font-size="80" font-weight="bold" text-anchor="middle" dominant-baseline="middle" class="text-brand-500">g</text>
            </svg>
        </div>

        <!-- Main Content -->
        <div class="text-center max-w-2xl mx-auto">
            <!-- 404 Number -->
            <h1 class="text-9xl md:text-10xl font-display font-bold text-brand-500 mb-4 leading-tight">404</h1>

            <!-- Heading -->
            <h2 class="text-4xl md:text-5xl font-display font-bold text-dark-900 mb-4">Page Not Found</h2>

            <!-- Subtitle -->
            <p class="text-lg md:text-xl text-dark-600 mb-12 leading-relaxed">
                The page you're looking for doesn't exist or has been moved.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center sm:items-start">
                <a href="/" class="px-8 py-4 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg transition-colors inline-block">
                    Go Home
                </a>
                <a href="/agents" class="px-8 py-4 border-2 border-brand-500 text-brand-600 hover:bg-brand-50 font-semibold rounded-lg transition-colors inline-block">

    <!-- @include partials/footer.html -->

    <!-- @include partials/auth.html -->

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Check if user has admin session
        var session = sessionStorage.getItem('goulburn_session');

        // Check if this is an admin session (you may need to verify the token format or make an API call)
        if (session) {
            // Try to redirect to admin backend
            // This is a simple check - you may want to validate the token server-side
            var isAdmin = false;

            try {
                // If the token contains admin claims (adjust based on your token structure)
                // This is a placeholder - implement your actual admin check logic
                fetch('https://goulburn-admin-production.up.railway.app/api/v1/admin/verify', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + session,
                        'Content-Type': 'application/json'
                    }
                })
                .then(function(response) {
                    if (response.ok) {
                        // Admin verified - redirect
                        window.location.href = 'https://goulburn-admin-production.up.railway.app';
                    }
                    // If not admin, stay on 404 page (non-admin users see 404)
                })
                .catch(function() {
                    // On error, stay on 404 page
                });
            } catch (e) {
                // Stay on 404 page if verification fails
            }
        }
        // If no session, stay on 404 page (looks like the page doesn't exist to non-admins)
    });
    </script>
