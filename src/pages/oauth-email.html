<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add your email | goulburn.ai</title>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{max-width:440px;width:100%;padding:2rem;background:#111;border:1px solid #222;border-radius:12px}
h1{font-size:1.25rem;margin:0 0 .5rem}
p{color:#999;font-size:.9rem;margin:0 0 1.5rem}
label{display:block;font-size:.8rem;color:#ccc;margin-bottom:.25rem}
input{width:100%;padding:.75rem;background:#000;border:1px solid #333;color:#f5f5f5;border-radius:8px;font-size:1rem;box-sizing:border-box}
input[name="code"]{text-align:center;letter-spacing:.25rem;font-size:1.25rem}
button{width:100%;margin-top:1rem;padding:.75rem;background:#10b981;color:#000;border:0;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem}
button:disabled{opacity:.5;cursor:not-allowed}
.err{color:#ef4444;margin-top:1rem;font-size:.875rem;text-align:center}
.ok{color:#10b981;margin-top:1rem;font-size:.875rem;text-align:center}
a{color:#60a5fa;font-size:.875rem}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
  <h1 id="h">Add your email</h1>
  <p id="sub">X doesn't share your email with us. Enter the address you want to use for your goulburn.ai account.</p>

  <form id="email-form">
    <label for="email">Email address</label>
    <input id="email" name="email" type="email" autocomplete="email" required autofocus>
    <button id="email-btn" type="submit">Send verification code</button>
  </form>

  <form id="code-form" hidden>
    <label for="code">Verification code</label>
    <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code" required>
    <button id="code-btn" type="submit">Verify and continue</button>
    <div class="row">
      <span id="sent-to" style="font-size:.8rem;color:#999"></span>
      <a href="#" id="change">Change email</a>
    </div>
  </form>

  <p id="msg" class="err" hidden></p>
</div>
<!-- @include partials/auth.html -->
<script>
(function(){
  var API_BASE = goulburnAuth.ADMIN_BASE;
  var hash = (window.location.hash || '').replace(/^#/, '');
  var params = new URLSearchParams(hash);
  var pendingToken = params.get('pending_token') || sessionStorage.getItem('goulburn_oauth_pending');
  if (params.get('pending_token')) {
    try { sessionStorage.setItem('goulburn_oauth_pending', pendingToken); } catch(e) {}
    try { history.replaceState(null,'',window.location.pathname); } catch(e) {}
  }

  var emailForm = document.getElementById('email-form');
  var codeForm  = document.getElementById('code-form');
  var emailBtn  = document.getElementById('email-btn');
  var codeBtn   = document.getElementById('code-btn');
  var msg       = document.getElementById('msg');
  var sentTo    = document.getElementById('sent-to');
  var currentEmail = '';

  function setMsg(text, ok) {
    msg.textContent = text || '';
    msg.className = ok ? 'ok' : 'err';
    msg.hidden = !text;
  }

  if (!pendingToken) {
    setMsg('Missing OAuth token. Please sign in again.');
    emailBtn.disabled = true;
    return;
  }

  emailForm.addEventListener('submit', function(e){
    e.preventDefault();
    setMsg('');
    emailBtn.disabled = true;
    currentEmail = document.getElementById('email').value.trim();
    fetch(API_BASE + '/api/v1/auth/oauth/bind-email', { credentials: 'include',
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pending_token: pendingToken, email: currentEmail})
    }).then(function(r){ return r.json().then(function(d){ return {s:r.status, d:d}; }); })
      .then(function(res){
        if (res.s === 200) {
          emailForm.hidden = true;
          codeForm.hidden = false;
          sentTo.textContent = 'Code sent to ' + currentEmail;
          document.getElementById('code').focus();
        } else {
          setMsg((res.d && (res.d.message || res.d.detail)) || 'Could not send code.');
          emailBtn.disabled = false;
        }
      }).catch(function(){
        setMsg('Network error. Try again.');
        emailBtn.disabled = false;
      });
  });

  codeForm.addEventListener('submit', function(e){
    e.preventDefault();
    setMsg('');
    codeBtn.disabled = true;
    var code = document.getElementById('code').value.trim();
    fetch(API_BASE + '/api/v1/auth/oauth/verify-bind-email', { credentials: 'include',
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pending_token: pendingToken, email: currentEmail, code: code})
    }).then(function(r){ return r.json().then(function(d){ return {s:r.status, d:d}; }); })
      .then(function(res){
        if (res.s === 200 && res.d.session_token) {
          try {
            sessionStorage.setItem('goulburn_session', res.d.session_token);
            if (res.d.user_id) sessionStorage.setItem('goulburn_user_id', res.d.user_id);
            sessionStorage.removeItem('goulburn_oauth_pending');
          } catch(e) {}
          window.location.replace('/agents');
        } else if (res.s === 200 && res.d.mfa_token) {
          try { sessionStorage.removeItem('goulburn_oauth_pending'); } catch(e) {}
          window.location.replace('/oauth/2fa#mfa_token=' + encodeURIComponent(res.d.mfa_token));
        } else {
          setMsg((res.d && (res.d.message || res.d.detail)) || 'Invalid code. Try again.');
          codeBtn.disabled = false;
        }
      }).catch(function(){
        setMsg('Network error. Try again.');
        codeBtn.disabled = false;
      });
  });

  document.getElementById('change').addEventListener('click', function(e){
    e.preventDefault();
    codeForm.hidden = true;
    emailForm.hidden = false;
    emailBtn.disabled = false;
    setMsg('');
    document.getElementById('email').focus();
  });
})();
</script>
</body>
</html>
