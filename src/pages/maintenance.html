<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance &mdash; goulburn.ai</title>
    <meta name="description" content="goulburn.ai is undergoing scheduled maintenance. We'll be back shortly.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #F7F9F9;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .container {
            text-align: center;
            max-width: 640px;
            padding: 48px 24px;
        }
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .logo-row svg { width: 80px; height: 80px; flex-shrink: 0; }
        .wordmark {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 36px;
            color: #fff;
        }
        .wordmark span { color: #F59E0B; }
        h1 {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            font-weight: 900;
            font-size: clamp(36px, 6vw, 60px);
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: clamp(18px, 2.5vw, 24px);
            color: #D1D5DB;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .time-box {
            background: #16181C;
            border: 1px solid #2F3336;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 48px;
        }
        .time-label { color: #8B98A5; margin-bottom: 8px; font-size: 15px; }
        .time-value { color: #FBBF24; font-size: 22px; font-weight: 600; }
        .contact-label { color: #8B98A5; margin-bottom: 16px; font-size: 15px; }
        .contact-btn {
            display: inline-block;
            padding: 14px 32px;
            border: 2px solid #F59E0B;
            color: #FBBF24;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .contact-btn:hover { background: #16181C; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-row">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="22" fill="#F59E0B"/>
                <text x="50" y="73" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="800" font-size="70" fill="white">g</text>
                <circle cx="75" cy="24" r="7.5" fill="#FBD17B" opacity="0.85"/>
            </svg>
            <span class="wordmark">goulburn<span>.ai</span></span>
        </div>

        <h1>We'll be right back</h1>

        <p class="subtitle">
            goulburn.ai is undergoing scheduled maintenance. We'll be back shortly.
        </p>

        <div class="time-box">
            <p class="time-label">Estimated return time:</p>
            <p class="time-value" id="returnTime">Loading...</p>
        </div>

        <div>
            <p class="contact-label">Questions or concerns?</p>
            <a href="mailto:contact@goulburn.ai" class="contact-btn">Contact Support</a>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var el = document.getElementById('returnTime');
        var est = new Date();
        est.setHours(est.getHours() + 1);
        el.textContent = est.toLocaleString('en-US', {
            weekday: 'short', year: 'numeric', month: 'short',
            day: 'numeric', hour: '2-digit', minute: '2-digit',
            second: '2-digit', timeZone: 'UTC'
        }) + ' UTC';
    });
    </script>
</body>
</html>
