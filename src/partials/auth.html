    <script>
    // Shared auth utilities
    // _validateSessionOnLoad: stale-token guard
    var goulburnAuth = (function() {
        var API_BASE = 'https://api.goulburn.ai';
        var ADMIN_BASE = 'https://admin.goulburn.ai';

        // Storage strategy:
        //   - 'remember me' checked at sign-in -> writes to localStorage (persists
        //     across browser restarts) + sets a goulburn_remember=1 flag
        //   - unchecked -> writes to sessionStorage (cleared when tab closes)
        // getSession reads localStorage first, falls back to sessionStorage,
        // so callers get the right token regardless of how the user signed in.
        function _getRememberStore() {
            try {
                return localStorage.getItem('goulburn_remember') === '1' ? localStorage : sessionStorage;
            } catch (e) {
                // localStorage may throw in restricted contexts (e.g. some
                // private-browsing modes). Fall back to sessionStorage.
                return sessionStorage;
            }
        }

        function getSession() {
            try {
                var ls = localStorage.getItem('goulburn_session');
                if (ls) return ls;
            } catch (e) {}
            return sessionStorage.getItem('goulburn_session');
        }

        // setSession(token, opts?) - opts.remember=true -> localStorage
        // Backward compat: setSession(token) without opts keeps the existing
        // sessionStorage behaviour for any callers that don't pass remember.
        function setSession(token, opts) {
            opts = opts || {};
            try {
                if (opts.remember) {
                    localStorage.setItem('goulburn_session', token);
                    localStorage.setItem('goulburn_remember', '1');
                    // Clean up any sessionStorage copy from a previous non-remembered sign-in
                    sessionStorage.removeItem('goulburn_session');
                    return;
                }
                // Not remembering -> use sessionStorage and clear any stale localStorage copy
                sessionStorage.setItem('goulburn_session', token);
                localStorage.removeItem('goulburn_session');
                localStorage.removeItem('goulburn_remember');
            } catch (e) {
                // Storage hiccup -> last-resort sessionStorage write
                try { sessionStorage.setItem('goulburn_session', token); } catch (_) {}
            }
        }

        function clearSession() {
            try {
                localStorage.removeItem('goulburn_session');
                localStorage.removeItem('goulburn_reg_id');
                localStorage.removeItem('goulburn_user_id');
                localStorage.removeItem('goulburn_display_name');
                localStorage.removeItem('goulburn_remember');
            } catch (e) {}
            sessionStorage.removeItem('goulburn_session');
            sessionStorage.removeItem('goulburn_reg_id');
            sessionStorage.removeItem('goulburn_user_id');
            sessionStorage.removeItem('goulburn_display_name');
        }

        function getRegId() {
            try {
                var ls = localStorage.getItem('goulburn_reg_id');
                if (ls) return ls;
            } catch (e) {}
            return sessionStorage.getItem('goulburn_reg_id');
        }

        function setRegId(id) {
            // Mirror the session storage choice so both pieces stay together.
            var store = _getRememberStore();
            store.setItem('goulburn_reg_id', id);
        }

        function isAuthenticated() {
            return !!getSession();
        }

        function signOut() {
            // Phase 1.5: invalidate session server-side BEFORE clearing client state.
            // Best-effort — if the call fails the client clears anyway. Returns a
            // promise the caller can await; signOut() itself is fire-and-forget so
            // older nav-button onclick handlers continue to work synchronously.
            var token = getSession();
            try {
                fetch(window.goulburnAuth.ADMIN_BASE + '/api/v1/auth/logout', {
                    method: 'POST',
                    credentials: 'include',
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
                }).catch(function () {});
            } catch (e) {}
            clearSession();
            window.location.href = '/';
        }

        function requireAuth() {
            if (!isAuthenticated()) {
                window.location.href = '/sign-in?redirect=' + encodeURIComponent(window.location.pathname);
                return false;
            }
            // If on bare /dashboard or /settings, redirect to ID-based URL
            var regId = getRegId();
            var path = window.location.pathname;
            if (regId) {
                // Preserve search + hash so deep links survive the rewrite.
                // Belt-and-braces: ALSO stash hash in sessionStorage because
                // some browsers / Vercel edge paths strip fragments on
                // multi-step location.replace() chains.
                try {
                    if (window.location.hash) {
                        sessionStorage.setItem('goulburn_pending_hash', window.location.hash);
                    }
                } catch (_) {}
                var qsHash = window.location.search + window.location.hash;
                if (path === '/dashboard') {
                    window.location.replace('/dashboard/' + regId + qsHash);
                    return false;
                }
                if (path === '/settings') {
                    window.location.replace('/dashboard/settings/' + regId + qsHash);
                    return false;
                }
            }
            return true;
        }

        return {
            API_BASE: API_BASE,
            ADMIN_BASE: ADMIN_BASE,
            getSession: getSession,
            setSession: setSession,
            clearSession: clearSession,
            isAuthenticated: isAuthenticated,
            signOut: signOut,
            requireAuth: requireAuth,
            getRegId: getRegId,
            setRegId: setRegId
        };
    })();
    </script>

    <!-- Session timeout: inactivity detection + auto-logout -->
    <div id="sessionTimeoutBanner" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;max-width:380px;width:calc(100% - 48px);background:#1a1a2e;border:1px solid rgba(245,158,11,0.4);border-radius:12px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-family:inherit;">
        <div style="display:flex;align-items:flex-start;gap:12px;">
            <div style="flex-shrink:0;width:40px;height:40px;border-radius:50%;background:rgba(245,158,11,0.15);display:flex;align-items:center;justify-content:center;">
                <svg width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </div>
            <div style="flex:1;min-width:0;">
                <p style="margin:0 0 4px;font-size:0.9rem;font-weight:600;color:#f1f5f9;">Session expiring</p>
                <p style="margin:0 0 14px;font-size:0.8rem;color:#94a3b8;line-height:1.4;">You'll be signed out in <span id="timeoutCountdown" style="font-weight:700;color:#f59e0b;">60</span> seconds due to inactivity.</p>
                <div style="display:flex;gap:8px;">
                    <button id="timeoutStayBtn" style="flex:1;padding:8px 0;border:none;border-radius:8px;background:#f59e0b;color:#000;font-size:0.8rem;font-weight:600;cursor:pointer;transition:background 0.15s;">Stay signed in</button>
                    <button id="timeoutLogoutBtn" style="flex:1;padding:8px 0;border:1px solid rgba(148,163,184,0.3);border-radius:8px;background:transparent;color:#94a3b8;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;">Sign out now</button>
                </div>
            </div>
        </div>
        <div style="margin-top:14px;height:3px;background:rgba(148,163,184,0.15);border-radius:2px;overflow:hidden;">
            <div id="timeoutProgressBar" style="height:100%;background:#f59e0b;border-radius:2px;width:100%;transition:width 1s linear;"></div>
        </div>
    </div>

    <script>
    // Session timeout controller
    (function() {
        var IDLE_LIMIT_MS = 15 * 60 * 1000;  // 15 minutes of inactivity before warning
        var COUNTDOWN_SEC = 60;               // 60 second countdown in the warning

        var idleTimer = null;
        var countdownTimer = null;
        var countdownRemaining = COUNTDOWN_SEC;
        var banner = null;
        var countdownEl = null;
        var progressBar = null;
        var isWarning = false;

        function init() {
            if (!goulburnAuth.isAuthenticated()) return;

            banner = document.getElementById('sessionTimeoutBanner');
            countdownEl = document.getElementById('timeoutCountdown');
            progressBar = document.getElementById('timeoutProgressBar');

            if (!banner) return;

            // Activity events
            var events = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
            events.forEach(function(evt) {
                document.addEventListener(evt, onActivity, { passive: true });
            });

            // Buttons
            document.getElementById('timeoutStayBtn').addEventListener('click', function() {
                dismissWarning();
                resetIdleTimer();
            });
            document.getElementById('timeoutLogoutBtn').addEventListener('click', function() {
                doLogout();
            });

            resetIdleTimer();
        }

        function onActivity() {
            if (isWarning) {
                // Activity during warning dismisses it
                dismissWarning();
            }
            resetIdleTimer();
        }

        function resetIdleTimer() {
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(showWarning, IDLE_LIMIT_MS);
        }

        function showWarning() {
            if (!goulburnAuth.isAuthenticated()) return;
            isWarning = true;
            countdownRemaining = COUNTDOWN_SEC;
            countdownEl.textContent = countdownRemaining;
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';

            // Force reflow then animate
            void progressBar.offsetWidth;
            progressBar.style.transition = 'width 1s linear';

            banner.style.display = 'block';
            // Slide-in animation
            banner.style.opacity = '0';
            banner.style.transform = 'translateY(20px)';
            void banner.offsetWidth;
            banner.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            banner.style.opacity = '1';
            banner.style.transform = 'translateY(0)';

            tickCountdown();
        }

        function tickCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(function() {
                countdownRemaining--;
                if (countdownEl) countdownEl.textContent = countdownRemaining;
                if (progressBar) progressBar.style.width = ((countdownRemaining / COUNTDOWN_SEC) * 100) + '%';

                if (countdownRemaining <= 0) {
                    clearInterval(countdownTimer);
                    doLogout();
                }
            }, 1000);
        }

        function dismissWarning() {
            isWarning = false;
            if (countdownTimer) clearInterval(countdownTimer);
            if (banner) {
                banner.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                banner.style.opacity = '0';
                banner.style.transform = 'translateY(20px)';
                setTimeout(function() { banner.style.display = 'none'; }, 200);
            }
        }

        function doLogout() {
            isWarning = false;
            if (countdownTimer) clearInterval(countdownTimer);
            if (idleTimer) clearTimeout(idleTimer);
            goulburnAuth.clearSession();
            // Redirect to sign-in with a message
            window.location.href = '/sign-in?timeout=1';
        }

        // Boot
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();

    // ──────────────────────────────────────────────────────────────
    // Universal registration-ID URL stamp. Runs on every page once
    // the user is signed in. Appends ?u={reg_id} to the address bar
    // via history.replaceState. Works on all pages including public
    // ones (feed, agent profiles, landing) because it uses a query
    // parameter rather than a path segment — zero collision with
    // existing routes.
    //
    // Pages that already path-stamp (/dashboard/:id, /settings/:id)
    // are left alone — their own page-level logic handles URL state.
    //
    // Privacy note: the reg_id appears in the address bar. On public
    // pages, if you copy-paste the URL to share externally, your
    // reg_id goes with it. The ID alone doesn't grant access (auth
    // is by session) but treat as semi-private. Referrer-Policy is
    // tightened to same-origin on /dashboard/* and /settings/* to
    // prevent leakage via Referer header on outbound clicks.
    // ──────────────────────────────────────────────────────────────
    (function stampRegIdUniverse() {
        try {
            if (!goulburnAuth.isAuthenticated()) return;

            function stampIfMissing(regId) {
                if (!regId) return;
                var path = window.location.pathname;
                // Skip pages that handle their own path-level stamping
                if (/^\/dashboard(?:\/\d+)?\/?$/.test(path)) return;
                if (/^\/settings(?:\/\d+)?\/?$/.test(path)) return;
                if (/^\/dashboard\/settings(?:\/\d+)?\/?$/.test(path)) return;

                // Already stamped?
                var params = new URLSearchParams(window.location.search);
                if (params.get('u') === regId) return;

                params.set('u', regId);
                var newUrl = path + '?' + params.toString() + window.location.hash;
                try { history.replaceState(null, '', newUrl); } catch (e) { /* no-op */ }
            }

            // Use cached reg_id if present — avoids an extra /me fetch
            // on every page load once the user is signed in.
            var cached = goulburnAuth.getRegId && goulburnAuth.getRegId();
            if (cached) {
                stampIfMissing(cached);
                return;
            }
            // Cold: fetch /me once. Two responsibilities:
            //  1. cache the registration_id so subsequent page loads skip the call
            //  2. detect a stale session token (e.g. expired Remember Me localStorage
            //     entry) and wipe it so the UI doesn't pretend the user is signed in.
            // Without (2), authHref() returns direct profile links + the user thinks
            // they're not logged in but the page treats them as authed.
            fetch(goulburnAuth.ADMIN_BASE + '/api/v1/admin/me', { credentials: 'include',
                headers: { 'Authorization': 'Bearer ' + goulburnAuth.getSession() }
            })
            .then(function(r) {
                if (r.status === 401 || r.status === 403) {
                    if (goulburnAuth.clearSession) goulburnAuth.clearSession();
                    if (!sessionStorage.getItem('goulburn_stale_session_reloaded')) {
                        sessionStorage.setItem('goulburn_stale_session_reloaded', '1');
                        window.location.reload();
                    }
                    return null;
                }
                sessionStorage.removeItem('goulburn_stale_session_reloaded');
                return r.ok ? r.json() : null;
            })
            .catch(function() { return null; })
            .then(function(profile) {
                if (profile && profile.registration_id) {
                    if (goulburnAuth.setRegId) goulburnAuth.setRegId(profile.registration_id);
                    stampIfMissing(profile.registration_id);
                }
            });
        } catch (e) { /* silent — never block page render */ }
    })();
    </script>
