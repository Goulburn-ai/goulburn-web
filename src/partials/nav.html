    <script>
    // Nav: highlight active link + auth state
    (function() {
        var path = window.location.pathname;
        document.querySelectorAll('#navLinks a[data-nav]').forEach(function(a) {
            if (path.startsWith(a.getAttribute('href'))) {
                a.classList.remove('text-dark-500');
                a.classList.add('text-brand-600', 'font-semibold');
            }
        });
        // Auth state check.
        // Phase B (2026-05-05): the bearer in localStorage is no longer the
        // sole source of truth — cookie-only sessions are first-class. We:
        //   1. Render guest UI by default (avoid an auth-flash for true guests)
        //   2. Flip to auth UI synchronously if a bearer is present (fast path)
        //   3. Otherwise, listen for goulburn:auth-ready (fired by auth_v2.html
        //      partial after its /auth/me probe completes) and flip if the
        //      cookie-only session is alive.
        function _flipNavToAuth() {
            var guest = document.getElementById('navGuest');
            var auth = document.getElementById('navAuth');
            var mGuest = document.getElementById('mobileGuest');
            var mAuth = document.getElementById('mobileAuth');
            var hamburger = document.getElementById('navHamburger');
            if (guest) guest.classList.add('hidden');
            if (auth) {
                auth.classList.remove('hidden');
                auth.style.display = '';  // override inline display:none
            }
            if (mGuest) mGuest.classList.add('hidden');
            if (mAuth) mAuth.classList.remove('hidden');
            // Hide the mobile hamburger when authed — the avatar dropdown is the
            // single mobile entry point. Public links live inside the dropdown.
            if (hamburger) hamburger.style.display = 'none';
        }
        var _bearerSession = (function() {
            try { var ls = localStorage.getItem('goulburn_session'); if (ls) return ls; } catch (e) {}
            return sessionStorage.getItem('goulburn_session');
        })();
        if (_bearerSession) {
            _flipNavToAuth();
        } else {
            // Cookie-only path — handle two timing cases:
            //   1. authReady has already resolved (probe finished before nav.html
            //      ran) → check the resolved value directly.
            //   2. authReady has NOT resolved yet → addEventListener catches the
            //      goulburn:auth-ready event when it fires.
            // Both paths converge on _flipNavToAuth() if cookie auth is alive.
            function _onAuthReadyEvent(ev) {
                // Accept either flag — auth_v2.html dispatches { user, authenticated }.
                // Old code only checked .authenticated; if the partial regresses
                // to user-only, this still works.
                var ok = !!(ev && ev.detail && (ev.detail.authenticated || ev.detail.user));
                if (ok) {
                    _flipNavToAuth();
                    if (typeof _stampNavRegId === 'function') _stampNavRegId();
                }
            }
            document.addEventListener('goulburn:auth-ready', _onAuthReadyEvent);
            // Belt-and-braces: if authReady already resolved, check it directly.
            try {
                if (typeof goulburnAuth !== 'undefined' && goulburnAuth.authReady) {
                    goulburnAuth.authReady.then(function(ok) {
                        if (ok) {
                            _flipNavToAuth();
                            if (typeof _stampNavRegId === 'function') _stampNavRegId();
                        }
                    });
                }
            } catch (_) {}
        }
    })();
    
            // Update nav links with registration ID
            function _stampNavRegId() {
            var navRegId = (function() {
                try { var ls = localStorage.getItem('goulburn_reg_id'); if (ls) return ls; } catch (e) {}
                return sessionStorage.getItem('goulburn_reg_id');
            })();
            if (navRegId) {
                var navLinks = [
                    ['navDashLink', '/dashboard/' + navRegId],
                    ['navSettingsLink', '/dashboard/settings/' + navRegId],
                    ['mobileNavDashLink', '/dashboard/' + navRegId],
                    ['mobileNavSettingsLink', '/dashboard/settings/' + navRegId]
                ];
                navLinks.forEach(function(pair) {
                    var el = document.getElementById(pair[0]);
                    if (el) el.href = pair[1];
                });
            }
            }
            // Run once on load — picks up bearer-path reg_id immediately.
            // Re-run on goulburn:auth-ready (cookie path) — handled in IIFE above.
            _stampNavRegId();

            // ── User-menu dropdown wiring ────────────────────────────
            (function() {
                var btn = document.getElementById('userMenuBtn');
                var panel = document.getElementById('userDropdown');
                var signoutBtn = document.getElementById('userDropdownSignout');
                if (!btn || !panel) return;

                function open() {
                    panel.classList.remove('hidden');
                    btn.setAttribute('aria-expanded', 'true');
                }
                function close() {
                    panel.classList.add('hidden');
                    btn.setAttribute('aria-expanded', 'false');
                }
                function isOpen() { return !panel.classList.contains('hidden'); }

                btn.addEventListener('click', function(ev) {
                    ev.stopPropagation();
                    if (isOpen()) close(); else open();
                });
                document.addEventListener('click', function(ev) {
                    if (!isOpen()) return;
                    if (panel.contains(ev.target) || btn.contains(ev.target)) return;
                    close();
                });
                document.addEventListener('keydown', function(ev) {
                    if (ev.key === 'Escape' && isOpen()) { close(); btn.focus(); }
                });
                if (signoutBtn) {
                    signoutBtn.addEventListener('click', function() {
                        try { if (typeof goulburnAuth !== 'undefined') goulburnAuth.signOut(); } catch (e) {}
                    });
                }

                function _populateUserMenu(user) {
                    if (!user) return;
                    var em = (user.email || '').trim();
                    var emEl = document.getElementById('userDropdownEmail');
                    if (emEl && em) emEl.textContent = em;
                    var avEl = document.getElementById('userMenuAvatar');
                    if (avEl && em) {
                        var ch = em.charAt(0).toUpperCase();
                        if (ch) avEl.textContent = ch;
                    }
                    var reg = (function() {
                        try { return localStorage.getItem('goulburn_reg_id') || sessionStorage.getItem('goulburn_reg_id'); } catch (e) { return null; }
                    })();
                    if (reg) {
                        var dash = document.getElementById('userDropdownDash');
                        if (dash) dash.href = '/dashboard/' + reg;
                        var stt = document.getElementById('userDropdownSettings');
                        if (stt) stt.href = '/dashboard/settings/' + reg;
                    }
                    var handle = user.handle || user.operator_handle;
                    if (handle) {
                        var prof = document.getElementById('userDropdownProfile');
                        if (prof) prof.href = '/operator/' + encodeURIComponent(handle);
                    }
                }
                document.addEventListener('goulburn:auth-ready', function(ev) {
                    if (ev && ev.detail && ev.detail.user) _populateUserMenu(ev.detail.user);
                });
                try {
                    if (typeof goulburnAuth !== 'undefined' && goulburnAuth.authReady) {
                        goulburnAuth.authReady.then(function(ok) {
                            if (ok && goulburnAuth.getUser) {
                                var u = goulburnAuth.getUser();
                                if (u) _populateUserMenu(u);
                            }
                        });
                    }
                } catch (_) {}
            })();
        </script>
