    <script>
    // Nav: highlight active link + auth state
    (function() {
        var path = window.location.pathname;
        document.querySelectorAll('#navLinks a[data-nav]').forEach(function(a) {
            if (path.startsWith(a.getAttribute('href'))) {
                a.classList.remove('text-dark-500');
                a.classList.add('text-brand-600', 'font-semibold');
            }
        });
        // Auth state check.
        // Phase B (2026-05-05): the bearer in localStorage is no longer the
        // sole source of truth — cookie-only sessions are first-class. We:
        //   1. Render guest UI by default (avoid an auth-flash for true guests)
        //   2. Flip to auth UI synchronously if a bearer is present (fast path)
        //   3. Otherwise, listen for goulburn:auth-ready (fired by auth_v2.html
        //      partial after its /auth/me probe completes) and flip if the
        //      cookie-only session is alive.
        function _flipNavToAuth() {
            var guest = document.getElementById('navGuest');
            var auth = document.getElementById('navAuth');
            var mGuest = document.getElementById('mobileGuest');
            var mAuth = document.getElementById('mobileAuth');
            var hamburger = document.getElementById('navHamburger');
            if (guest) guest.classList.add('hidden');
            if (auth) {
                auth.classList.remove('hidden');
                auth.style.display = '';  // override inline display:none
            }
            if (mGuest) mGuest.classList.add('hidden');
            if (mAuth) mAuth.classList.remove('hidden');
            // Keep the mobile hamburger visible when authed — 2026-05-10:
            // hamburger is the menu surface for Dashboard / Settings / Sign Out
            // links (defined in #mobileAuth). Avatar dropdown coexists for
            // quick account access (email, profile).
        }
        var _bearerSession = (function() {
            try { var ls = localStorage.getItem('goulburn_session'); if (ls) return ls; } catch (e) {}
            return sessionStorage.getItem('goulburn_session');
        })();
        // 2026-05-28 (anti-flash): use gb_auth_hint as a synchronous fast-path.
        // The hint is set by auth_v2 after a successful /api/auth/me probe.
        // Without this, cookie-only sessions render guest nav for 150-300ms
        // while the probe runs, then flip to auth — a visible header flash on
        // every page navigation. With the hint, we flip BEFORE the body
        // becomes visible (FOUC CSS keeps it at opacity:0 until .gb-ready).
        // Edge case: stale hint after server-side logout → brief auth flash
        // before probe corrects it. Acceptable trade for the common case.
        var _authHint = false;
        try { _authHint = localStorage.getItem('gb_auth_hint') === '1'; } catch (e) {}
        if (_bearerSession || _authHint) {
            _flipNavToAuth();
        } else {
            // Cookie-only path — handle two timing cases:
            //   1. authReady has already resolved (probe finished before nav.html
            //      ran) → check the resolved value directly.
            //   2. authReady has NOT resolved yet → addEventListener catches the
            //      goulburn:auth-ready event when it fires.
            // Both paths converge on _flipNavToAuth() if cookie auth is alive.
            function _onAuthReadyEvent(ev) {
                // Accept either flag — auth_v2.html dispatches { user, authenticated }.
                // Old code only checked .authenticated; if the partial regresses
                // to user-only, this still works.
                var ok = !!(ev && ev.detail && (ev.detail.authenticated || ev.detail.user));
                if (ok) {
                    _flipNavToAuth();
                    if (typeof _stampNavRegId === 'function') _stampNavRegId();
                }
            }
            document.addEventListener('goulburn:auth-ready', _onAuthReadyEvent);
            // Belt-and-braces: if authReady already resolved, check it directly.
            try {
                if (typeof goulburnAuth !== 'undefined' && goulburnAuth.authReady) {
                    goulburnAuth.authReady.then(function(ok) {
                        if (ok) {
                            _flipNavToAuth();
                            if (typeof _stampNavRegId === 'function') _stampNavRegId();
                        }
                    });
                }
            } catch (_) {}
        }
    })();
    
            // Update nav links with registration ID
            function _stampNavRegId() {
            var navRegId = (function() {
                try { var ls = localStorage.getItem('goulburn_reg_id'); if (ls) return ls; } catch (e) {}
                return sessionStorage.getItem('goulburn_reg_id');
            })();
            if (navRegId) {
                var navLinks = [
                    ['navDashLink', '/dashboard/' + navRegId],
                    ['navSettingsLink', '/dashboard/settings/' + navRegId],
                    ['mobileNavDashLink', '/dashboard/' + navRegId],
                    ['mobileNavSettingsLink', '/dashboard/settings/' + navRegId]
                ];
                navLinks.forEach(function(pair) {
                    var el = document.getElementById(pair[0]);
                    if (el) el.href = pair[1];
                });
            }
            }
            // Run once on load — picks up bearer-path reg_id immediately.
            // Re-run on goulburn:auth-ready (cookie path) — handled in IIFE above.
            _stampNavRegId();

            // ── User-menu dropdown wiring ────────────────────────────
            (function() {
                var btn = document.getElementById('userMenuBtn');
                var panel = document.getElementById('userDropdown');
                var signoutBtn = document.getElementById('userDropdownSignout');
                if (!btn || !panel) return;

                function open() {
                    panel.classList.remove('hidden');
                    btn.setAttribute('aria-expanded', 'true');
                }
                function close() {
                    panel.classList.add('hidden');
                    btn.setAttribute('aria-expanded', 'false');
                }
                function isOpen() { return !panel.classList.contains('hidden'); }

                btn.addEventListener('click', function(ev) {
                    ev.stopPropagation();
                    if (isOpen()) close(); else open();
                });
                document.addEventListener('click', function(ev) {
                    if (!isOpen()) return;
                    if (panel.contains(ev.target) || btn.contains(ev.target)) return;
                    close();
                });
                document.addEventListener('keydown', function(ev) {
                    if (ev.key === 'Escape' && isOpen()) { close(); btn.focus(); }
                });
                if (signoutBtn) {
                    signoutBtn.addEventListener('click', function() {
                        try { if (typeof goulburnAuth !== 'undefined') goulburnAuth.signOut(); } catch (e) {}
                    });
                }

                function _populateUserMenu(user) {
                    if (!user) return;
                    var em = (user.email || '').trim();
                    var emEl = document.getElementById('userDropdownEmail');
                    if (emEl && em) emEl.textContent = em;
                    // Avatar is now the goulburn emblem (<img src="/goulburn-emblem.svg">).
                    // We deliberately do NOT overwrite textContent — keeping the brand
                    // mark consistent for every signed-in operator. The <img> tag carries
                    // its own fallback alt text so screen readers still get "Account menu".
                    var reg = (function() {
                        try { return localStorage.getItem('goulburn_reg_id') || sessionStorage.getItem('goulburn_reg_id'); } catch (e) { return null; }
                    })();
                    if (reg) {
                        var dash = document.getElementById('userDropdownDash');
                        if (dash) dash.href = '/dashboard/' + reg;
                        var stt = document.getElementById('userDropdownSettings');
                        if (stt) stt.href = '/dashboard/settings/' + reg;
                    }
                    var handle = user.handle || user.operator_handle;
                    if (handle) {
                        var prof = document.getElementById('userDropdownProfile');
                        if (prof) prof.href = '/operator/' + encodeURIComponent(handle);
                    }
                    // 2026-05-12: reveal Admin link when /api/auth/me reports
                    // role === 'admin'. The link is hidden in markup so it
                    // never flashes for non-admins on a cold auth probe.
                    try {
                        var roleStr = (user.role || '').toString().toLowerCase();
                        if (roleStr === 'admin') {
                            var adminEl = document.getElementById('userDropdownAdmin');
                            if (adminEl) {
                                adminEl.classList.remove('hidden');
                                adminEl.classList.add('block');
                            }
                        }
                    } catch (_) {}
                }
                document.addEventListener('goulburn:auth-ready', function(ev) {
                    if (ev && ev.detail && ev.detail.user) _populateUserMenu(ev.detail.user);
                });
                try {
                    if (typeof goulburnAuth !== 'undefined' && goulburnAuth.authReady) {
                        goulburnAuth.authReady.then(function(ok) {
                            if (ok && goulburnAuth.getUser) {
                                var u = goulburnAuth.getUser();
                                if (u) _populateUserMenu(u);
                            }
                        });
                    }
                } catch (_) {}
            })();
        </script>

    <script>
    // ── In-product notifications (Shape A bell icon) ──────────────────
    var _notifApiBase = 'https://api.goulburn.ai';
    var _notifOpen = false;

    function _notifHeaders() {
        var s = (typeof goulburnAuth !== 'undefined' && goulburnAuth.getSession) ? goulburnAuth.getSession() : null;
        return { 'Authorization': s ? 'Bearer ' + s : '', 'Content-Type': 'application/json' };
    }

    function _notifEsc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
        });
    }

    function _notifRelTime(iso) {
        if (!iso) return '';
        try {
            var d = new Date(iso);
            var diff = (Date.now() - d.getTime()) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return d.toLocaleDateString();
        } catch (e) { return iso; }
    }

    var _sevColors = {
        success: { bg: 'rgba(16,185,129,0.06)', border: '#10b981', icon: '&#x2191;' },
        warning: { bg: 'rgba(245,158,11,0.06)', border: '#f59e0b', icon: '&#x26A0;' },
        danger:  { bg: 'rgba(239,68,68,0.06)',  border: '#ef4444', icon: '&#x2193;' },
        info:    { bg: 'transparent',            border: 'rgba(255,255,255,0.08)', icon: '&#x2139;' },
    };

    async function pollNotifCount() {
        var badge = document.getElementById('navBellBadge');
        var bell = document.getElementById('navBellBtn');
        if (!bell) return;
        try {
            var r = await fetch(_notifApiBase + '/api/v1/owner/alerts/unread-count', {
                credentials: 'include', headers: _notifHeaders()
            });
            if (r.status === 401) { bell.style.display = 'none'; return; }
            if (!r.ok) return;
            var d = await r.json();
            var n = d.unread || 0;
            bell.style.display = '';
            if (n > 0) {
                badge.textContent = n > 99 ? '99+' : n;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }
        } catch (e) {}
    }

    function toggleNotifDropdown() {
        var dd = document.getElementById('navNotifDropdown');
        if (!dd) return;
        _notifOpen = !_notifOpen;
        dd.style.display = _notifOpen ? '' : 'none';
        if (_notifOpen) loadNotifList();
    }

    async function loadNotifList() {
        var list = document.getElementById('notifList');
        if (!list) return;
        try {
            var r = await fetch(_notifApiBase + '/api/v1/owner/alerts?limit=15', {
                credentials: 'include', headers: _notifHeaders()
            });
            if (!r.ok) { list.innerHTML = '<div style="padding:16px; color:#fca5a5; font-size:12px;">Could not load</div>'; return; }
            var d = await r.json();
            var items = d.data || [];
            if (!items.length) {
                list.innerHTML = '<div style="padding:20px; text-align:center; color:rgba(247,249,249,0.4); font-size:12px;">No notifications yet</div>';
                return;
            }
            list.innerHTML = items.map(function(n) {
                var c = _sevColors[n.severity] || _sevColors.info;
                var unread = !n.read;
                return '<div style="padding:8px 14px; border-bottom:0.5px solid rgba(255,255,255,0.06);' +
                    (unread ? ' background:' + c.bg + '; border-left:3px solid ' + c.border + ';' : ' border-left:3px solid transparent;') +
                    ' cursor:pointer;" onclick="markNotifRead(' + n.id + ', this)">' +
                    '<div style="font-size:13px; color:' + (unread ? '#F7F9F9' : 'rgba(247,249,249,0.6)') + '; font-weight:' + (unread ? '500' : '400') + ';">' + _notifEsc(n.title) + '</div>' +
                    (n.body ? '<div style="font-size:12px; color:rgba(247,249,249,0.45); margin-top:2px;">' + _notifEsc(n.body) + '</div>' : '') +
                    '<div style="font-size:11px; color:rgba(247,249,249,0.3); margin-top:3px;">' + _notifRelTime(n.created_at) + (n.read ? ' &middot; read' : '') + '</div>' +
                    '</div>';
            }).join('');
        } catch (e) {
            list.innerHTML = '<div style="padding:16px; color:#fca5a5; font-size:12px;">Network error</div>';
        }
    }

    async function markNotifRead(id, el) {
        try {
            await fetch(_notifApiBase + '/api/v1/owner/alerts/read', {
                method: 'POST', credentials: 'include', headers: _notifHeaders(),
                body: JSON.stringify({ ids: [id] })
            });
            if (el) {
                el.style.background = 'transparent';
                el.style.borderLeftColor = 'transparent';
            }
            pollNotifCount();
        } catch (e) {}
    }

    async function markAllNotifRead() {
        try {
            await fetch(_notifApiBase + '/api/v1/owner/alerts/read-all', {
                method: 'POST', credentials: 'include', headers: _notifHeaders()
            });
            loadNotifList();
            pollNotifCount();
        } catch (e) {}
    }

    // Close dropdown on outside click
    document.addEventListener('click', function(e) {
        if (_notifOpen && !e.target.closest('#navBellBtn') && !e.target.closest('#navNotifDropdown')) {
            _notifOpen = false;
            var dd = document.getElementById('navNotifDropdown');
            if (dd) dd.style.display = 'none';
        }
    });

    // Boot: poll immediately + every 60s
    (function() {
        setTimeout(pollNotifCount, 1500);
        setInterval(pollNotifCount, 60000);
    })();
    </script>
