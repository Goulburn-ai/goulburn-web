<!--
  Auth partial — cookie-first probe with legacy bearer fallback,
  plus the session-timeout banner, registration-id URL stamp, and
  pwa_install include that the previous partials/auth.html provided.

  Public API on window.goulburnAuth (superset of legacy auth.html so
  the rest of the site can include this partial without code changes):

    // v2 (preferred)
    .ready()              -> Promise<user|null>
    .user()               -> user|null (sync after ready)
    .isAuthenticated()    -> bool
    .identityTier()       -> 0 | 1 | 2
    .identityScore()      -> 0 | 50 | 100
    .signOut()            -> wipes cookie + bearer, redirects to /
    .authFetch(url, opts) -> fetch with credentials:include + bearer if any

    // legacy compat
    .API_BASE             -> 'https://api.goulburn.ai'
    .ADMIN_BASE           -> 'https://admin.goulburn.ai'
    .getSession()         -> bearer-or-null from localStorage/sessionStorage
    .setSession(t, opts)  -> persist bearer (callers from old sign-in)
    .clearSession()       -> wipe bearer + reg id
    .getRegId()           -> registration_id from user or cache
    .setRegId(id)         -> persist registration_id
    .requireAuth()        -> redirects to /sign-in if probe resolves null
    .validateSession()    -> Promise<bool>; like ready() but boolean-shaped
    .authReady            -> Promise<bool>; eager-resolved on partial load
-->
<script>
(function() {
    var API_BASE   = 'https://api.goulburn.ai';
    var ADMIN_BASE = 'https://admin.goulburn.ai';
    var SESSION_LS_KEY = 'goulburn_session';
    var REG_ID_LS_KEY  = 'goulburn_reg_id';

    var _user  = null;
    var _ready = null;

    // ── Bearer / reg-id storage helpers (legacy + v2-cookie sentinel) ──
    //
    // 2026-05-10 (Daniel): the sentinel below closes a class of "every CTA
    // is broken for new operators" bugs. After auth_v2 cutover, users who
    // sign in via Google OAuth or magic-link only have the HttpOnly
    // gb_session cookie — no localStorage bearer. Many legacy handlers
    // gate on `if (goulburnAuth.getSession()) { ... }` for truthiness;
    // returning null treated those users as guests despite a valid cookie
    // (Run probe → "SIGN IN REQUIRED", agent.html ?edit=runtime → guest banner).
    //
    // Fix: when the /api/auth/me probe has confirmed a v2 cookie, return
    // the sentinel string 'gb:cookie' so legacy `if (session)` checks pass.
    // Bearer-construction sites send `Authorization: Bearer gb:cookie` —
    // goulburn-api's get_human_owner / auth deps check cookie FIRST, so
    // the fake bearer is ignored and the cookie validates the request.
    var GB_V2_COOKIE_SENTINEL = 'gb:cookie';
    function getSession() {
        try {
            var v = localStorage.getItem(SESSION_LS_KEY);
            if (v) return v;
        } catch (_) {}
        try {
            var v2 = sessionStorage.getItem(SESSION_LS_KEY);
            if (v2) return v2;
        } catch (_) {}
        // v2-cookie path: no bearer, but probe confirmed gb_session is alive
        if (_user) return GB_V2_COOKIE_SENTINEL;
        return null;
    }
    function setSession(token, opts) {
        opts = opts || {};
        try {
            if (opts.remember === false) {
                sessionStorage.setItem(SESSION_LS_KEY, token);
                localStorage.removeItem(SESSION_LS_KEY);
            } else {
                localStorage.setItem(SESSION_LS_KEY, token);
                sessionStorage.removeItem(SESSION_LS_KEY);
            }
        } catch (_) {}
        _ready = probe();
    }
    function clearSession() {
        try { localStorage.removeItem(SESSION_LS_KEY); } catch (_) {}
        try { sessionStorage.removeItem(SESSION_LS_KEY); } catch (_) {}
        try { localStorage.removeItem(REG_ID_LS_KEY); } catch (_) {}
        _user = null;
    }
    function getRegId() {
        if (_user && _user.registration_id) return _user.registration_id;
        try { return localStorage.getItem(REG_ID_LS_KEY) || null; }
        catch (_) { return null; }
    }
    function setRegId(id) {
        try { if (id) localStorage.setItem(REG_ID_LS_KEY, id); } catch (_) {}
    }

    // ── Session probe: cookie first, bearer fallback ────────────────
    async function probe() {
        try {
            var r = await fetch(API_BASE + '/api/auth/me', {
                credentials: 'include',
                cache: 'no-store',
            });
            if (r.ok) {
                var body = await r.json();
                if (body && body.user) {
                    _user = body.user;
                    if (_user.registration_id) setRegId(_user.registration_id);
                    return _user;
                }
            }
        } catch (_) {}

        var bearer = getSession();
        if (bearer) {
            try {
                var r2 = await fetch(API_BASE + '/api/v1/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + bearer },
                    credentials: 'include',
                    cache: 'no-store',
                });
                if (r2.ok) {
                    var body2 = await r2.json();
                    var legacyUser = body2 && body2.user ? body2.user
                                   : (body2 && body2.email ? body2 : null);
                    if (legacyUser) {
                        _user = legacyUser;
                        if (legacyUser.registration_id) setRegId(legacyUser.registration_id);
                        return _user;
                    }
                }
                if (r2.status === 401) clearSession();
            } catch (_) {}
        }

        _user = null;
        return null;
    }

    function ready() {
        if (_ready === null) _ready = probe();
        return _ready;
    }
    function user() { return _user; }
    function isAuthenticated() { return _user !== null; }

    function identityTier() {
        if (!_user) return 0;
        var ident = _user.identity || {};
        if (ident.identity_verified_at) return 2;
        if (ident.email_verified_at)    return 1;
        return 0;
    }
    function identityScore() {
        var t = identityTier();
        return t === 2 ? 100 : (t === 1 ? 50 : 0);
    }

    async function validateSession() {
        var u = await ready();
        return u !== null;
    }

    async function signOut() {
        try {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST', credentials: 'include',
            });
        } catch (_) {}
        try {
            await fetch(ADMIN_BASE + '/api/v1/auth/logout', {
                method: 'POST', credentials: 'include',
            });
        } catch (_) {}
        clearSession();
        _ready = Promise.resolve(null);
        try {
            document.dispatchEvent(new CustomEvent('goulburn:auth-changed', {
                detail: { user: null, authenticated: false }
            }));
        } catch (_) {}
        window.location.href = '/';
    }

    function authFetch(url, opts) {
        opts = Object.assign({}, opts || {});
        opts.credentials = 'include';
        var bearer = getSession();
        if (bearer) {
            opts.headers = Object.assign({}, opts.headers || {});
            if (!opts.headers.Authorization && !opts.headers.authorization) {
                opts.headers.Authorization = 'Bearer ' + bearer;
            }
        }
        return fetch(url, opts);
    }

    function requireAuth() {
        if (isAuthenticated()) return true;
        ready().then(function(u) {
            if (u === null) {
                window.location.href = '/sign-in?redirect=' +
                    encodeURIComponent(window.location.pathname + window.location.search);
            }
        });
        return false;
    }

    var initialReady = ready();
    var authReadyBool = initialReady.then(function(u) { return u !== null; });

    initialReady.then(function(u) {
        try {
            document.dispatchEvent(new CustomEvent('goulburn:auth-ready', {
                detail: { user: u, authenticated: u !== null }
            }));
        } catch (_) {}
    });

    window.goulburnAuth = {
        API_BASE:   API_BASE,
        ADMIN_BASE: ADMIN_BASE,
        ready: ready,
        user: user,
        isAuthenticated: isAuthenticated,
        identityTier: identityTier,
        identityScore: identityScore,
        signOut: signOut,
        authFetch: authFetch,
        getSession: getSession,
        setSession: setSession,
        clearSession: clearSession,
        getRegId: getRegId,
        setRegId: setRegId,
        requireAuth: requireAuth,
        validateSession: validateSession,
        authReady: authReadyBool,
    };
})();
</script>

<!-- Session timeout: inactivity detection + auto-logout (ported verbatim
     from legacy auth.html so 16-page migration is behaviour-preserving) -->
<div id="sessionTimeoutBanner" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;max-width:380px;width:calc(100% - 48px);background:#1a1a2e;border:1px solid rgba(245,158,11,0.4);border-radius:12px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-family:inherit;">
    <div style="display:flex;align-items:flex-start;gap:12px;">
        <div style="flex-shrink:0;width:40px;height:40px;border-radius:50%;background:rgba(245,158,11,0.15);display:flex;align-items:center;justify-content:center;">
            <svg width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div style="flex:1;min-width:0;">
            <p style="margin:0 0 4px;font-size:0.9rem;font-weight:600;color:#f1f5f9;">Session expiring</p>
            <p style="margin:0 0 14px;font-size:0.8rem;color:#94a3b8;line-height:1.4;">You'll be signed out in <span id="timeoutCountdown" style="font-weight:700;color:#f59e0b;">60</span> seconds due to inactivity.</p>
            <div style="display:flex;gap:8px;">
                <button id="timeoutStayBtn" style="flex:1;padding:8px 0;border:none;border-radius:8px;background:#f59e0b;color:#000;font-size:0.8rem;font-weight:600;cursor:pointer;transition:background 0.15s;">Stay signed in</button>
                <button id="timeoutLogoutBtn" style="flex:1;padding:8px 0;border:1px solid rgba(148,163,184,0.3);border-radius:8px;background:transparent;color:#94a3b8;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;">Sign out now</button>
            </div>
        </div>
    </div>
    <div style="margin-top:14px;height:3px;background:rgba(148,163,184,0.15);border-radius:2px;overflow:hidden;">
        <div id="timeoutProgressBar" style="height:100%;background:#f59e0b;border-radius:2px;width:100%;transition:width 1s linear;"></div>
    </div>
</div>

<script>
// Idle timeout controller
(function() {
    var IDLE_LIMIT_MS = 15 * 60 * 1000;
    var COUNTDOWN_SEC = 60;

    var idleTimer = null;
    var countdownTimer = null;
    var countdownRemaining = COUNTDOWN_SEC;
    var banner = null;
    var countdownEl = null;
    var progressBar = null;
    var isWarning = false;

    function start() {
        // Wait for the auth probe so we don't arm the timer for guests.
        goulburnAuth.ready().then(function(u) {
            if (u === null) return;

            banner = document.getElementById('sessionTimeoutBanner');
            countdownEl = document.getElementById('timeoutCountdown');
            progressBar = document.getElementById('timeoutProgressBar');
            if (!banner) return;

            ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(function(evt) {
                document.addEventListener(evt, onActivity, { passive: true });
            });
            var stay = document.getElementById('timeoutStayBtn');
            var out  = document.getElementById('timeoutLogoutBtn');
            if (stay) stay.addEventListener('click', function() { dismissWarning(); resetIdleTimer(); });
            if (out)  out.addEventListener('click', doLogout);

            resetIdleTimer();
        });
    }

    function onActivity() {
        if (isWarning) dismissWarning();
        resetIdleTimer();
    }
    function resetIdleTimer() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(showWarning, IDLE_LIMIT_MS);
    }
    function showWarning() {
        if (!goulburnAuth.isAuthenticated()) return;
        isWarning = true;
        countdownRemaining = COUNTDOWN_SEC;
        if (countdownEl) countdownEl.textContent = countdownRemaining;
        if (progressBar) {
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            void progressBar.offsetWidth;
            progressBar.style.transition = 'width 1s linear';
        }
        banner.style.display = 'block';
        banner.style.opacity = '0';
        banner.style.transform = 'translateY(20px)';
        void banner.offsetWidth;
        banner.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        banner.style.opacity = '1';
        banner.style.transform = 'translateY(0)';
        tickCountdown();
    }
    function tickCountdown() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(function() {
            countdownRemaining--;
            if (countdownEl) countdownEl.textContent = countdownRemaining;
            if (progressBar) progressBar.style.width = ((countdownRemaining / COUNTDOWN_SEC) * 100) + '%';
            if (countdownRemaining <= 0) {
                clearInterval(countdownTimer);
                doLogout();
            }
        }, 1000);
    }
    function dismissWarning() {
        isWarning = false;
        if (countdownTimer) clearInterval(countdownTimer);
        if (banner) {
            banner.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            banner.style.opacity = '0';
            banner.style.transform = 'translateY(20px)';
            setTimeout(function() { banner.style.display = 'none'; }, 200);
        }
    }
    function doLogout() {
        isWarning = false;
        if (countdownTimer) clearInterval(countdownTimer);
        if (idleTimer) clearTimeout(idleTimer);
        goulburnAuth.clearSession();
        window.location.href = '/sign-in?timeout=1';
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
    } else {
        start();
    }
})();

// Universal registration-ID URL stamp. Adds ?u={reg_id} to the URL on
// pages that don't already path-stamp. Re-imported verbatim from the
// legacy partial so the address bar behaviour is identical.
(function stampRegIdUniverse() {
    try {
        goulburnAuth.ready().then(function(u) {
            if (u === null) return;

            function stampIfMissing(regId) {
                if (!regId) return;
                var path = window.location.pathname;
                if (/^\/dashboard(?:\/\d+)?\/?$/.test(path)) return;
                if (/^\/settings(?:\/\d+)?\/?$/.test(path)) return;
                if (/^\/dashboard\/settings(?:\/\d+)?\/?$/.test(path)) return;
                var params = new URLSearchParams(window.location.search);
                if (params.get('u') === regId) return;
                params.set('u', regId);
                var newUrl = path + '?' + params.toString() + window.location.hash;
                try { history.replaceState(null, '', newUrl); } catch (_) {}
            }

            var cached = goulburnAuth.getRegId && goulburnAuth.getRegId();
            if (cached) { stampIfMissing(cached); return; }

            // Cold path — fetch /admin/me once for the registration_id.
            // Defensive on failure: never wipe the session (Phase B
            // 2026-05-05 lesson — transient 401s used to log valid users
            // out via clearSession()+reload).
            (typeof goulburnAuth.authFetch === 'function'
                ? goulburnAuth.authFetch(goulburnAuth.ADMIN_BASE + '/api/v1/admin/me')
                : fetch(goulburnAuth.ADMIN_BASE + '/api/v1/admin/me', { credentials: 'include' }))
            .then(function(r) { return r.ok ? r.json() : null; })
            .catch(function() { return null; })
            .then(function(profile) {
                if (profile && profile.registration_id) {
                    if (goulburnAuth.setRegId) goulburnAuth.setRegId(profile.registration_id);
                    stampIfMissing(profile.registration_id);
                }
            });
        });
    } catch (_) {}
})();
</script>
