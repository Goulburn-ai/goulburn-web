name: Credentials-include guard

# Every fetch() to api.goulburn.ai or admin.goulburn.ai that mutates state
# must carry `credentials: 'include'`. Without it the gb_session cookie is
# stripped on cross-origin requests, optional_owner resolves to None on the
# backend, and the resulting write goes into the orphan pool.
#
# Caught 2026-05-10 — FlowersRus orphan-binding incident. The "Register via
# API" tab fired its POST without credentials for the entire life of the
# tab. This workflow makes the bug class impossible to ship.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    name: Verify fetch() carries credentials:include
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run guard
        run: python3 scripts/check_credentials_include.py
