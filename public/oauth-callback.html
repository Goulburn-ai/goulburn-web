    <script>
        /**
         * Canonical OAuth callback bouncer.
         *
         * Every OAuth provider (GitHub / Discord / X / LinkedIn) is configured
         * to redirect here. We pull the code + state + error out of the query
         * string, stash them in sessionStorage, and bounce the user back to
         * whichever page initiated the flow (which is responsible for doing
         * the POST /api/v1/oauth/{platform}/callback exchange).
         *
         * The initiating page is expected to set these keys BEFORE redirecting
         * the user to the provider's auth URL:
         *   goulburn_oauth_return_to  — absolute path to bounce back to, e.g. "/agents/register"
         *   goulburn_oauth_platform   — "github" | "twitter" | "discord" | "linkedin"
         *   goulburn_oauth_flow       — "register" | "signin" (optional, for UX branching)
         */
        (function() {
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            var state = params.get('state');
            var error = params.get('error');
            var errorDescription = params.get('error_description');

            var returnTo = sessionStorage.getItem('goulburn_oauth_return_to') || '/agents/register';

            // Stash for the return page to pick up.
            if (code) sessionStorage.setItem('goulburn_oauth_code', code);
            if (state) sessionStorage.setItem('goulburn_oauth_state', state);
            if (error) {
                sessionStorage.setItem('goulburn_oauth_error', error);
                if (errorDescription) {
                    sessionStorage.setItem('goulburn_oauth_error_description', errorDescription);
                }
            }

            // Set a freshness marker so the return page knows this is a live bounce.
            sessionStorage.setItem('goulburn_oauth_bounced_at', String(Date.now()));

            // If neither code nor error came back, something is wrong — show it.
            if (!code && !error) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = 'Nothing to verify';
                document.getElementById('subtitle').textContent = 'We didn\'t receive an authorization code or error from the provider. Please try again.';
                document.getElementById('errorBox').classList.remove('hidden');
                return;
            }

            // Bounce back immediately. Use replace so browser back button skips this page.
            window.location.replace(returnTo);
        })();
    </script>
