<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying — goulburn.ai</title>
    <meta name="description" content="Completing verification, please wait.">
    <meta name="robots" content="noindex">
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Dark theme — bold, high-contrast, X.com-inspired.
        // The `dark` scale is INVERTED from Tailwind's stock grays so that
        // existing classes (text-dark-900 for headings, bg-dark-50 for pale
        // sections, border-dark-200 for hairlines) automatically map to the
        // correct dark-mode tone without touching every page.
        // Brand gold (#F59E0B) is preserved — gold-on-black is the CTA colour.
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#FFFBEB', 100: '#FEF3C7', 200: '#FDE68A', 300: '#FCD34D', 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706', 700: '#B45309', 800: '#92400E', 900: '#78350F' },
                        dark: {
                            50:  '#0A0A0A', // was near-white — now near-black (page wash)
                            100: '#16181C', // X card colour
                            200: '#2F3336', // X hairline border
                            300: '#3E4144',
                            400: '#71767B', // X secondary text
                            500: '#8B98A5', // readable muted
                            600: '#B1B7BD',
                            700: '#D1D5DB',
                            800: '#E5E7EB',
                            900: '#F7F9F9'  // near-white — used for headings
                        }
                    },
                    fontFamily: {
                        display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        body: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; background: #000; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #000 !important;   /* override any legacy bg-white on body */
            color: #F7F9F9;
        }
        /* Cards that still use bg-white become X's card colour, NOT pure white. */
        :not(body).bg-white { background-color: #16181C !important; }
        /* Pale brand backgrounds (bg-brand-50, bg-brand-100) originally amber-white
           — repainted as dark gold tints so icon pills and hover states read as
           subtle gold on black instead of blinding cream. */
        .bg-brand-50  { background-color: #1C1409 !important; }
        .bg-brand-100 { background-color: #3D2810 !important; }
        .hover\:bg-brand-50:hover  { background-color: #1C1409 !important; }
        .hover\:bg-brand-100:hover { background-color: #3D2810 !important; }
        /* Dark-100 (#16181C) used as page-wash on some pages — keep consistent.
           No override needed, tailwind value already matches. */
        /* Any legacy bg-dark-50 (used as page wash) — pure black for the
           "sits inside a void" feel. */
        .bg-dark-50 { background-color: #000 !important; }
        /* Soften default input backgrounds so they sit on black. */
        input, textarea, select {
            background-color: #16181C;
            color: #F7F9F9;
            border-color: #2F3336;
        }
        input::placeholder, textarea::placeholder { color: #71767B; }
        /* Links inherit gold accent by default only inside prose; nav controls its own. */
        /* Scrollbars — subtle, X-style. */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #2F3336; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3E4144; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 24px; height: 24px; border: 3px solid #2F3336; border-top-color: #F59E0B; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white">
    <section class="min-h-screen flex items-center justify-center px-4" style="background: linear-gradient(180deg, #FFFBEB 0%, #FFFFFF 60%);">
        <div class="max-w-md w-full bg-white rounded-2xl border border-dark-200 p-10 text-center shadow-sm">
            <div class="flex justify-center mb-6">
                <div class="w-12 h-12 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin" id="spinner"></div>
            </div>
            <h1 class="text-2xl font-display font-bold text-dark-900 mb-2" id="title">Completing verification…</h1>
            <p class="text-dark-600" id="subtitle">Returning you to goulburn.ai — don't close this tab.</p>
            <div class="mt-6 hidden" id="errorBox">
                <a href="/agents/register" class="inline-block px-4 py-2 bg-brand-600 text-white rounded-lg font-semibold hover:bg-brand-700 transition">Back to Registration</a>
            </div>
        </div>
    </section>

    <script>
        /**
         * Canonical OAuth callback bouncer.
         *
         * Every OAuth provider (GitHub / Discord / X / LinkedIn) is configured
         * to redirect here. We pull the code + state + error out of the query
         * string, stash them in sessionStorage, and bounce the user back to
         * whichever page initiated the flow (which is responsible for doing
         * the POST /api/v1/oauth/{platform}/callback exchange).
         *
         * The initiating page is expected to set these keys BEFORE redirecting
         * the user to the provider's auth URL:
         *   goulburn_oauth_return_to  — absolute path to bounce back to, e.g. "/agents/register"
         *   goulburn_oauth_platform   — "github" | "twitter" | "discord" | "linkedin"
         *   goulburn_oauth_flow       — "register" | "signin" (optional, for UX branching)
         */
        (function() {
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            var state = params.get('state');
            var error = params.get('error');
            var errorDescription = params.get('error_description');

            var returnTo = sessionStorage.getItem('goulburn_oauth_return_to') || '/agents/register';

            // Stash for the return page to pick up.
            if (code) sessionStorage.setItem('goulburn_oauth_code', code);
            if (state) sessionStorage.setItem('goulburn_oauth_state', state);
            if (error) {
                sessionStorage.setItem('goulburn_oauth_error', error);
                if (errorDescription) {
                    sessionStorage.setItem('goulburn_oauth_error_description', errorDescription);
                }
            }

            // Set a freshness marker so the return page knows this is a live bounce.
            sessionStorage.setItem('goulburn_oauth_bounced_at', String(Date.now()));

            // If neither code nor error came back, something is wrong — show it.
            if (!code && !error) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = 'Nothing to verify';
                document.getElementById('subtitle').textContent = 'We didn\'t receive an authorization code or error from the provider. Please try again.';
                document.getElementById('errorBox').classList.remove('hidden');
                return;
            }

            // Bounce back immediately. Use replace so browser back button skips this page.
            window.location.replace(returnTo);
        })();
    </script>
</body>
</html>
