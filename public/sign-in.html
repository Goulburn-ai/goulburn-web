                        <span class="px-2 bg-white text-dark-400">or continue with email</span>

                <!-- Email Form -->
                <form class="space-y-4" onsubmit="event.preventDefault(); alert('Demo: Sign in functionality would connect to authentication service');">
                    <div>
                        <label class="block text-sm font-medium text-dark-700 mb-1.5">Email</label>
                        <input type="email" id="email" aria-label="Email Address" placeholder="you@example.com" class="w-full px-3 py-2.5 bg-dark-50 border border-dark-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">

                    <div class="flex items-center justify-between">

                        </label>
                        <a href="mailto:support@goulburn.ai?subject=Password%20Reset%20Request" class="text-brand-600 hover:text-brand-700 font-medium">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-medium rounded-lg transition-colors">
                        Sign In
                    </button>
