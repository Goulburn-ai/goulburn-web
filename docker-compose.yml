# Goulburn Admin Backend - Docker Compose
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: goulburn-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - goulburn-network

  admin-api:
    build: .
    container_name: goulburn-admin-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_TOTP_SECRET=${ADMIN_TOTP_SECRET}
      - ALLOWED_IPS=${ALLOWED_IPS:-}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-30}
      - PORT=8000
      - DEBUG=${DEBUG:-false}
    depends_on:
      - redis
    networks:
      - goulburn-network
    # For production with SSL, mount certificates:
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  redis_data:

networks:
  goulburn-network:
    driver: bridge
